services:
  - type: web
    name: bazi-cloud-api
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements_cloud.txt
    startCommand: gunicorn cloud_api:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
